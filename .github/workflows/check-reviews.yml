name: Check Hotel Reviews

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:      # allow manual runs

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run review checker
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          YAHOO_APP_PASSWORD: ${{ secrets.YAHOO_APP_PASSWORD }}
        run: python check_reviews.py

      - name: Save state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_reviews.json
          git diff --staged --quiet || git commit -m "chore: update seen reviews state"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
